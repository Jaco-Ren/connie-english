<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connie 英语学习监督系统 · Online</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  window.addEventListener('error', function(e){
    alert('网页脚本错误：' + e.message);
  });
</script>
<style>
:root{--bg:#07090f;--card:#0e1119;--card2:#141820;--border:#1c2235;--hi:#28324a;--gold:#d4a853;--gold2:#f0c97a;--purple:#a78bfa;--green:#34d399;--amber:#f59e0b;--red:#f87171;--text:#dde2ed;--muted:#7e8fa8;--dim:#3d4d65;--r:14px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;min-height:100vh}.header{position:sticky;top:0;z-index:5;height:64px;background:rgba(7,9,15,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px}.brand{font-family:'Playfair Display',serif;color:var(--gold);font-size:21px}.sub{font:10px 'DM Mono',monospace;letter-spacing:2px;color:var(--dim);text-transform:uppercase}.center{text-align:center;color:var(--muted);font-size:13px}.right{display:flex;gap:8px;align-items:center}.btn{background:var(--card2);border:1px solid var(--hi);color:var(--text);border-radius:9px;padding:8px 14px;font-size:13px;cursor:pointer}.btn:hover{border-color:var(--gold);color:var(--gold)}.btn.gold{background:#2c2111;border-color:var(--gold);color:var(--gold2)}.btn.green{background:#0d3d28;border-color:var(--green);color:var(--green)}.btn.red{border-color:#450a0a;color:var(--red)}.wrap{max-width:1180px;margin:0 auto;padding:28px 22px 80px;display:flex;flex-direction:column;gap:20px}.login{max-width:420px;margin:90px auto;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px}.login h1{font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:8px}.input{width:100%;background:var(--card2);border:1px solid var(--hi);border-radius:9px;color:var(--text);padding:12px;margin-top:12px}.hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px;display:grid;grid-template-columns:auto 1fr auto auto;gap:22px;align-items:center}.avatar,.score{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--purple);background:#2d1f5e;color:var(--purple);font:700 28px 'Playfair Display',serif}.score{border-color:var(--gold);background:#3a2b12;color:var(--gold2);flex-direction:column}.score b{font-size:24px}.score span{font:8px 'DM Mono',monospace;color:var(--gold);letter-spacing:1px}.name{font:700 27px 'Playfair Display',serif}.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.tag{font-size:12px;color:var(--muted);background:var(--card2);border:1px solid var(--hi);padding:4px 10px;border-radius:20px}.note{background:var(--card);border:1px solid #6b5025;border-radius:var(--r);padding:16px;display:flex;gap:12px;align-items:center}.weekbar{display:flex;justify-content:space-between;align-items:center}.label{font:10px 'DM Mono',monospace;letter-spacing:3px;color:var(--dim);text-transform:uppercase}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}.day{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer}.day.sel{border-color:var(--gold);background:rgba(212,168,83,.08)}.day.today .num{color:var(--gold)}.dname{font:9px 'DM Mono',monospace;color:var(--dim);letter-spacing:2px}.num{font-size:20px;font-weight:700;margin:5px 0}.pips{display:flex;gap:4px;justify-content:center}.pip{width:7px;height:7px;border-radius:50%;background:var(--hi)}.pip.ok{background:var(--green);box-shadow:0 0 5px var(--green)}.pip.pending{background:var(--amber)}.pip.na{background:#111723}.tasks-head{display:flex;align-items:center;gap:12px}.tasks-head h2{font-family:'Playfair Display',serif}.chip{font:11px 'DM Mono',monospace;color:var(--purple);background:#2d1f5e;border:1px solid rgba(167,139,250,.3);padding:4px 12px;border-radius:20px}.tasks{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.task{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative}.task.pending{border-color:var(--amber)}.task.approved{border-color:var(--purple)}.task.rejected{border-color:var(--red)}.task.lock{opacity:.45}.emoji{font-size:29px}.pts{display:inline-block;font:11px 'DM Mono',monospace;color:var(--gold);background:rgba(212,168,83,.12);border:1px solid #6b5025;padding:2px 9px;border-radius:20px;margin:10px 0}.task h3{font-size:16px;margin-bottom:5px}.task p{font-size:12px;color:var(--dim);line-height:1.5}.freq{font:10px 'DM Mono',monospace;color:var(--dim);margin:10px 0 12px}.status{font:11px 'DM Mono',monospace;padding:7px 9px;border-radius:7px;margin:10px 0;color:var(--muted);background:var(--card2);border:1px solid var(--hi)}.thumb{width:100%;max-height:110px;object-fit:cover;border-radius:8px;border:1px solid var(--hi);margin:8px 0;cursor:pointer}.grid2{display:grid;grid-template-columns:1fr 1.2fr;gap:16px}.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}.panel-body{padding:14px 18px}.stat{display:flex;justify-content:space-between;align-items:center;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px}.bar{width:90px;height:5px;background:#1a2030;border-radius:3px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold))}.log{max-height:290px;overflow:auto}.log-row{display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);padding:9px 0;font-size:12px;color:var(--muted)}.review-item{display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--border);padding:12px 0}.review-item img{width:54px;height:44px;object-fit:cover;border-radius:6px;border:1px solid var(--hi);cursor:pointer}.hidden{display:none!important}#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:99;display:none;align-items:center;justify-content:center}#lightbox.open{display:flex}#lightbox img{max-width:90vw;max-height:85vh;border-radius:12px}.toast{position:fixed;right:24px;bottom:24px;background:var(--card);border:1px solid var(--hi);border-radius:10px;padding:12px 16px;color:var(--text);box-shadow:0 8px 30px #0008;z-index:120}@media(max-width:850px){.hero,.grid2{grid-template-columns:1fr}.tasks{grid-template-columns:1fr}.week{grid-template-columns:repeat(4,1fr)}.header{padding:0 14px}}
</style>
</head>
<body>
<div id="login" class="login">
  <h1>Connie's English</h1><p style="color:var(--muted);font-size:14px">登录后即可在线提交/审核任务。</p>
  <input id="email" class="input" type="email" placeholder="邮箱">
  <input id="password" class="input" type="password" placeholder="密码">
  <button class="btn gold" style="width:100%;margin-top:14px" onclick="signIn()">登录</button>
</div>
<div id="app" class="hidden">
<header class="header"><div><div class="brand">Connie's English</div><div class="sub">Supervised by Jaco · Online</div></div><div class="center"><div id="hdr-date"></div><div id="hdr-week" class="sub"></div></div><div class="right"><span id="role-tag" class="tag"></span><button class="btn" onclick="goToday()">今天</button><button class="btn red" onclick="signOut()">退出</button></div></header>
<div class="wrap">
  <div class="hero"><div class="avatar">C</div><div><div class="name">Connie</div><div class="sub">English Learner · CET-4 Prep</div><div class="tags"><span class="tag">📖 60词/天</span><span class="tag">📝 阅读×1/天</span><span class="tag">🎧 听力×1/隔天</span><span class="tag" id="weekly-full">本周 0 天全勤</span></div></div><div class="score"><b id="score">0</b><span>已获积分</span></div><div class="tag" id="streak">🔥 连续 0 天</div></div>
  <div id="note-box" class="note"></div>
  <div id="review-panel" class="panel hidden"><div class="panel-head"><span class="label" style="color:var(--amber)">⏳ 待 Jaco 审核</span><span id="review-count" class="label"></span></div><div class="panel-body" id="review-list"></div></div>
  <div><div class="weekbar"><span class="label">周进度 · <span id="week-range"></span></span><div><button class="btn" onclick="changeWeek(-1)">‹ 上周</button><button class="btn" onclick="changeWeek(1)">下周 ›</button></div></div><div id="week" class="week" style="margin-top:12px"></div></div>
  <div><div class="tasks-head"><h2 id="task-title">今日任务</h2><span id="date-chip" class="chip"></span></div><div id="tasks" class="tasks" style="margin-top:14px"></div></div>
  <div class="grid2"><div class="panel"><div class="panel-head"><span class="label">本周完成率</span><span id="week-pts" class="label"></span></div><div id="stats" class="panel-body"></div></div><div class="panel"><div class="panel-head"><span class="label">提交记录</span><span id="log-count" class="label"></span></div><div id="log" class="panel-body log"></div></div></div>
</div>
</div>
<input id="file" type="file" accept="image/*" class="hidden" onchange="handleFile(event)">
<div id="lightbox" onclick="this.classList.remove('open')"><img id="lightbox-img"></div>
<script>
const SUPABASE_URL='https://qpsfuydpsrudcfpfewrd.supabase.co';
const SUPABASE_KEY='sb_publishable_K5LSBbuUnZUCZT3oThIwXg_GMMilezf';
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const PTS={words:5,reading:7,listening:8};
const W=['SUN','MON','TUE','WED','THU','FRI','SAT'], WC=['周日','周一','周二','周三','周四','周五','周六'];
const META={words:{emoji:'📖',title:'单词任务',sub:'背诵今日60个英语单词',freq:'每天'},reading:{emoji:'📝',title:'四级阅读',sub:'完成一篇四级阅读理解',freq:'每天'},listening:{emoji:'🎧',title:'四级听力',sub:'完成一篇四级听力理解',freq:'每隔一天'}};
let session=null, profile=null, tasks=[], note='', weekOffset=0, viewDay=null, pendingUpload=null;
function ymd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`} function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x}
function weekStart(off=0){const d=startOfDay(new Date());d.setDate(d.getDate()-d.getDay()+off*7);return d}
function dayDate(di,off=weekOffset){const d=weekStart(off);d.setDate(d.getDate()+di);return d}
function fmt(d){return `${d.getMonth()+1}月${d.getDate()}日`} function full(d){return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${WC[d.getDay()]}`}
function hear(di,off=weekOffset){return Math.floor(dayDate(di,off).getTime()/86400000)%2===0}
function task(date,key){return tasks.find(t=>t.task_date===ymd(date)&&t.task_key===key)||{status:'none'}}
async function signIn(){const email=document.getElementById('email').value.trim(), password=document.getElementById('password').value; const {error}=await db.auth.signInWithPassword({email,password}); if(error) return toast('登录失败：'+error.message); await init();}
async function signOut(){await db.auth.signOut();location.reload()}
async function init(){const {data:{session:s}}=await db.auth.getSession();session=s;if(!s)return;document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');const {data:p,error}=await db.from('profiles').select('*').eq('id',s.user.id).single();if(error){toast('账号还没有绑定角色');return}profile=p;document.getElementById('role-tag').textContent=profile.role==='jaco'?'Jaco 审核':'Connie 提交';await loadAll();subscribe();}
async function loadAll(){const from=ymd(dayDate(0,-12)), to=ymd(dayDate(6,4)); const [{data:t},{data:n}]=await Promise.all([db.from('tasks').select('*').gte('task_date',from).lte('task_date',to).order('submitted_at',{ascending:false}),db.from('notes').select('*').eq('id',1).single()]);tasks=t||[];note=n?.content||'';render();}
function subscribe(){db.channel('online').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},loadAll).on('postgres_changes',{event:'*',schema:'public',table:'notes'},loadAll).subscribe();}
function render(){renderHead();renderHero();renderNote();renderReview();renderWeek();renderTasks();renderStats();renderLog();}
function renderHead(){const now=new Date(), ws=weekStart(), we=dayDate(6);document.getElementById('hdr-date').textContent=full(now);document.getElementById('hdr-week').textContent=`WEEK OF ${ws.getMonth()+1}/${ws.getDate()} – ${we.getMonth()+1}/${we.getDate()}`;document.getElementById('week-range').textContent=`${fmt(weekStart())} — ${fmt(dayDate(6))}`}
function isFull(di,off=weekOffset){const d=dayDate(di,off);return task(d,'words').status==='approved'&&task(d,'reading').status==='approved'&&(!hear(di,off)||task(d,'listening').status==='approved')}
function renderHero(){let pts=0;tasks.forEach(t=>{if(t.status==='approved')pts+=PTS[t.task_key]||0});document.getElementById('score').textContent=pts;let wf=0;for(let i=0;i<7;i++)if(isFull(i,0))wf++;document.getElementById('weekly-full').textContent=`本周 ${wf} 天全勤`;let st=0,d=startOfDay(new Date());while(true){let di=d.getDay(), ok=false;for(let off=-20;off<=0;off++){const ws=weekStart(off), we=dayDate(6,off);if(d>=ws&&d<=we){ok=isFull(di,off);break}}if(!ok)break;st++;d.setDate(d.getDate()-1)}document.getElementById('streak').textContent=`🔥 连续 ${st} 天`;}
function renderNote(){const box=document.getElementById('note-box');if(profile.role==='jaco'){box.innerHTML=`<b style="color:var(--gold)">Jaco 备注</b><input id="note-input" class="input" style="margin:0" value="${(note||'').replaceAll('"','&quot;')}" placeholder="给 Connie 留一句话"><button class="btn gold" onclick="saveNote()">保存</button>`}else{box.innerHTML=`<b style="color:var(--gold)">Jaco 对你说</b><span style="color:var(--muted)">${note||'暂无备注'}</span>`}}
async function saveNote(){const content=document.getElementById('note-input').value.trim();await db.from('notes').upsert({id:1,content,updated_at:new Date().toISOString()});toast('备注已保存')}
function renderReview(){const panel=document.getElementById('review-panel');if(profile.role!=='jaco'){panel.classList.add('hidden');return}panel.classList.remove('hidden');const pend=tasks.filter(t=>t.status==='pending');document.getElementById('review-count').textContent=`${pend.length} 条`;document.getElementById('review-list').innerHTML=pend.length?pend.map(t=>`<div class="review-item">${t.proof_url?`<img src="${t.proof_url}" onclick="showImg('${t.proof_url}')">`:''}<div style="flex:1"><b>${META[t.task_key].emoji} ${META[t.task_key].title}</b><div class="sub">${t.task_date} · ${t.proof_name||''}</div></div><button class="btn green" onclick="review('${t.task_date}','${t.task_key}','approved')">通过</button><button class="btn red" onclick="review('${t.task_date}','${t.task_key}','rejected')">不通过</button></div>`).join(''):'<div style="color:var(--dim);text-align:center;padding:20px">暂无待审核 ✓</div>'}
function renderWeek(){const el=document.getElementById('week');el.innerHTML='';const today=ymd(new Date());const sel=viewDay??new Date().getDay();for(let i=0;i<7;i++){const d=dayDate(i);const p=k=>{const s=task(d,k).status;return !((k==='listening')?hear(i):true)?'na':s==='approved'?'ok':s==='pending'?'pending':''};el.insertAdjacentHTML('beforeend',`<div class="day ${i===sel?'sel':''} ${ymd(d)===today?'today':''}" onclick="viewDay=${i};renderWeek();renderTasks()"><div class="dname">${W[i]}</div><div class="num">${d.getDate()}</div><div class="pips"><span class="pip ${p('words')}"></span><span class="pip ${p('reading')}"></span><span class="pip ${p('listening')}"></span></div></div>`)}}
function renderTasks(){const di=viewDay??new Date().getDay(), d=dayDate(di), today=ymd(new Date()), isToday=ymd(d)===today&&weekOffset===0;document.getElementById('task-title').textContent=isToday?'今日任务':'当日任务';document.getElementById('date-chip').textContent=full(d);const el=document.getElementById('tasks');el.innerHTML='';Object.keys(META).forEach(k=>{const m=META[k], avail=k!=='listening'||hear(di), t=task(d,k), st=t.status||'none';let actions='';if(!avail)actions='<div class="status">今日无听力</div>';else if(profile.role==='jaco')actions=st==='pending'?`<button class="btn green" onclick="review('${ymd(d)}','${k}','approved')">通过</button> <button class="btn red" onclick="review('${ymd(d)}','${k}','rejected')">不通过</button>`:'<div class="status">等待 Connie 提交</div>';else if(!isToday)actions='<div class="status">仅限当天提交</div>';else if(st==='approved')actions='<div class="status" style="color:var(--green)">✓ 已通过，积分已入账</div>';else actions=`<button class="btn gold" onclick="upload('${k}',${di})">${st==='pending'?'更换证明':'上传完成证明'}</button>`;el.insertAdjacentHTML('beforeend',`<div class="task ${st} ${!avail?'lock':''}"><div class="emoji">${m.emoji}</div><div class="pts">+${PTS[k]} 分</div><h3>${m.title}</h3><p>${m.sub}</p><div class="freq">${m.freq}</div>${t.proof_url?`<img class="thumb" src="${t.proof_url}" onclick="showImg('${t.proof_url}')">`:''}<div class="status">${st==='pending'?'⏳ 等待 Jaco 审核':st==='approved'?'✓ Jaco 已通过':st==='rejected'?'✕ 未通过，请重新提交':'尚未提交'}</div>${actions}</div>`)})}
function renderStats(){let earned=0,max=0;const items=['words','reading','listening'].map(k=>{let done=0,m=0;for(let i=0;i<7;i++){if(k==='listening'&&!hear(i))continue;m++;const d=dayDate(i);if(task(d,k).status==='approved'){done++;earned+=PTS[k]}}max+=m*PTS[k];return{n:META[k].title.replace('任务',''),done,m}});document.getElementById('week-pts').textContent=`已得 ${earned}/${max} 分`;document.getElementById('stats').innerHTML=items.map(it=>`<div class="stat"><div><b>${it.n}</b><div class="sub">目标 ${it.m}/${it.m}</div></div><div style="display:flex;gap:8px;align-items:center"><div class="bar"><div class="fill" style="width:${it.m?it.done/it.m*100:0}%"></div></div><span class="sub">${it.done}/${it.m}</span></div></div>`).join('')}
function renderLog(){const list=tasks.filter(t=>t.submitted_at).slice().sort((a,b)=>String(b.submitted_at).localeCompare(String(a.submitted_at))).slice(0,50);document.getElementById('log-count').textContent=`${list.length} 条`;document.getElementById('log').innerHTML=list.length?list.map(t=>`<div class="log-row"><span>${META[t.task_key].emoji}</span><span style="flex:1">${t.task_date} · ${META[t.task_key].title}</span><span>${t.status}</span><span style="color:var(--gold)">+${PTS[t.task_key]}</span></div>`).join(''):'<div style="text-align:center;color:var(--dim);padding:25px">暂无记录</div>'}
function changeWeek(n){weekOffset+=n;viewDay=null;render()}function goToday(){weekOffset=0;viewDay=null;render()}
function upload(k,di){pendingUpload={k,di};document.getElementById('file').value='';document.getElementById('file').click()}
function compress(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const max=1000;let w=img.width,h=img.height;if(w>max){h=Math.round(h*max/w);w=max}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>resolve(b),'image/jpeg',.72)};img.onerror=reject;img.src=e.target.result};r.onerror=reject;r.readAsDataURL(file)})}
async function handleFile(e){const file=e.target.files[0];if(!file||!pendingUpload)return;const {k,di}=pendingUpload,d=dayDate(di);toast('正在上传图片…');try{const blob=await compress(file);const path=`${ymd(d)}/${k}-${Date.now()}.jpg`;const {error:upErr}=await db.storage.from('proofs').upload(path,blob,{contentType:'image/jpeg',upsert:true});if(upErr)throw upErr;const {data:{publicUrl}}=db.storage.from('proofs').getPublicUrl(path);const row={task_date:ymd(d),task_key:k,status:'pending',proof_url:publicUrl,proof_name:file.name,submitted_at:new Date().toISOString()};const {error}=await db.from('tasks').upsert(row,{onConflict:'task_date,task_key'});if(error)throw error;toast('已提交，等待 Jaco 审核')}catch(err){toast('上传失败：'+err.message)}pendingUpload=null;await loadAll()}
async function review(date,key,status){const row={task_date:date,task_key:key,status,reviewed_at:new Date().toISOString(),reviewed_by:session.user.id};if(status==='rejected')row.proof_url=null;const {error}=await db.from('tasks').upsert(row,{onConflict:'task_date,task_key'});if(error)toast('审核失败：'+error.message);else toast(status==='approved'?'已通过':'已退回');await loadAll()}
function showImg(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open')}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3200)}
init();
</script>
</body>
</html>
