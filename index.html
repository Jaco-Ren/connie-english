<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connie 英语学习监督系统 · Online</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="login" class="login">
  <h1>Connie's English</h1>
  <p class="login-copy">登录后即可在线提交/审核任务。</p>
  <input id="email" class="input" type="email" placeholder="邮箱" autocomplete="email">
  <input id="password" class="input" type="password" placeholder="密码" autocomplete="current-password">
  <div id="login-error" class="login-error hidden" role="alert" aria-live="polite">
    <span class="login-error-icon" aria-hidden="true">!</span>
    <span id="login-error-text">邮箱或密码错误，请重试</span>
  </div>
  <button class="btn gold full-btn" onclick="signIn()">登录</button>
</div>
<div id="app" class="hidden">
<header class="header">
  <div>
    <div class="brand">Connie's English</div>
  </div>
  <div class="center">
    <div id="hdr-date"></div>
    <div id="hdr-week" class="sub"></div>
  </div>
  <div class="right">
    <span id="role-tag" class="tag"></span>
    <button class="btn" onclick="goToday()">今天</button>
    <button class="btn red" onclick="signOut()">退出</button>
  </div>
</header>
<div class="wrap">
  <div class="hero">
    <div class="hero-copy">
      <div class="avatar">C</div>
      <div>
        <div class="hero-kicker">Today’s English Rhythm</div>
        <div class="name">Connie, ready for today?</div>
        <div class="hero-sub">Vocabulary, reading, and listening in one calm routine.</div>
      </div>
    </div>
    <div class="hero-metrics">
      <div class="metric-card">
        <span>总积分</span>
        <b id="score">0</b>
      </div>
      <div class="metric-card">
        <span>本周全勤</span>
        <b id="weekly-full">本周 0 天</b>
      </div>
      <div class="metric-card">
        <span>连续学习</span>
        <b id="streak">连续 0 天</b>
      </div>
    </div>
  </div>
  <div id="note-box" class="note"></div>
  <div id="review-panel" class="panel hidden">
    <div class="panel-head">
      <span class="label review-label">待 Jaco 审核</span>
      <span id="review-count" class="label"></span>
    </div>
    <div class="panel-body" id="review-list"></div>
  </div>
  <div>
    <div class="weekbar">
      <span class="label">周进度 · <span id="week-range"></span></span>
      <div>
        <button class="btn" onclick="changeWeek(-1)">‹ 上周</button>
        <button class="btn" onclick="changeWeek(1)">下周 ›</button>
      </div>
    </div>
    <div id="week" class="week week-grid"></div>
  </div>
  <div>
    <div class="tasks-head">
      <h2 id="task-title">今日任务</h2>
      <span id="date-chip" class="chip"></span>
    </div>
    <div id="tasks" class="tasks task-grid"></div>
  </div>
  <div class="grid2">
    <div class="panel">
      <div class="panel-head">
        <span class="label">本周完成率</span>
        <span id="week-pts" class="label"></span>
      </div>
      <div id="stats" class="panel-body"></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span class="label">提交记录</span>
        <span id="log-count" class="label"></span>
      </div>
      <div id="log" class="panel-body log"></div>
    </div>
  </div>
</div>
</div>
<input id="file" type="file" accept="image/*" class="hidden" onchange="handleFile(event)">
<div id="lightbox" onclick="this.classList.remove('open')"><img id="lightbox-img" alt="提交证明"></div>
<script src="./app.js"></script>
</body>
</html>
